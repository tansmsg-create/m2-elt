version: 1
default_environment: dev
project_id: 019e8957-ee87-7181-b547-07750d29e6cb
python: python3.11

environments:
  - name: dev
  - name: staging
  - name: prod

plugins:
  extractors:
    - name: tap-csv
      variant: meltanolabs
      pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
      config:
        files:
          - { entity: customers,                         path: data/raw/olist_customers_dataset.csv,           keys: [customer_id],                       encoding: utf-8-sig }
          - { entity: geolocation,                       path: data/raw/olist_geolocation_dataset.csv,         keys: [geolocation_zip_code_prefix],       encoding: utf-8-sig }
          - { entity: order_items,                       path: data/raw/olist_order_items_dataset.csv,         keys: [order_id, order_item_id],           encoding: utf-8-sig }
          - { entity: order_payments,                    path: data/raw/olist_order_payments_dataset.csv,      keys: [order_id, payment_sequential],      encoding: utf-8-sig }
          - { entity: order_reviews,                     path: data/raw/olist_order_reviews_dataset.csv,       keys: [review_id],                         encoding: utf-8-sig }
          - { entity: orders,                            path: data/raw/olist_orders_dataset.csv,              keys: [order_id],                          encoding: utf-8-sig }
          - { entity: products,                          path: data/raw/olist_products_dataset.csv,            keys: [product_id],                        encoding: utf-8-sig }
          - { entity: sellers,                           path: data/raw/olist_sellers_dataset.csv,             keys: [seller_id],                         encoding: utf-8-sig }
          - { entity: product_category_name_translation, path: data/raw/product_category_name_translation.csv, keys: [product_category_name],             encoding: utf-8-sig }

  loaders:
    - name: target-bigquery
      variant: z3z1ma
      pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<80
      config:
        project: sctp-team2-project2-elt
        dataset: olin_bronze_dev_jun
        # batch_job = BigQuery load jobs. Reliable shutdown.
        # (storage_write_api loads the data fine but crashes on stream close with
        #  multiprocessing -> StreamClosedError -> non-zero exit -> false Dagster failure.)
        method: batch_job
        location: US
        denormalized: true
        flattening_enabled: true
        flattening_max_depth: 1

jobs:
  - name: olin-pipeline
    tasks:
      - tap-csv target-bigquery
