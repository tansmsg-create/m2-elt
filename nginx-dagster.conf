# nginx reverse proxy that puts an HTTP Basic Auth gate in front of the Dagster UI,
# so the public URL (http://<VM-IP>:3000) requires a username/password instead of
# being a wide-open, unauthenticated control plane.
#
# Used by run-dagster.sh: the dagster container runs internal-only on the `dagnet`
# docker network (name: olist-dagster, port 3000); this proxy is the only thing
# published to the host's :3000.
server {
    listen 3000;
    server_name _;

    # Static dbt docs site (model lineage / descriptions / tests). Generated into the
    # shared `dbt_docs` volume by run-dagster.sh and served behind the same auth gate.
    # Reach it at http://<VM-IP>:3000/dbt-docs/ .
    location /dbt-docs/ {
        auth_basic           "Olist Dagster — sign in";
        auth_basic_user_file /etc/nginx/.htpasswd;

        alias     /usr/share/nginx/dbt-docs/;
        index     index.html;
        try_files $uri $uri/ /dbt-docs/index.html;
    }

    location / {
        auth_basic           "Olist Dagster — sign in";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://olist-dagster:3000;

        # Dagster's UI uses WebSockets (GraphQL subscriptions) — must forward upgrades.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # keep long-lived run-log streams open
    }
}
